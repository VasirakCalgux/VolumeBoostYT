name: Build Tweak

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build VolumeBoostYT
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dependencies
        run: brew install ldid xz

      - name: Setup Theos
        run: git clone --recursive https://github.com/theos/theos.git ${{ github.workspace }}/theos

      - name: Setup iOS SDKs
        run: |
          rm -rf ${{ github.workspace }}/theos/sdks
          git clone https://github.com/theos/sdks.git ${{ github.workspace }}/theos/sdks

      - name: Build Package
        run: |
          make clean
          make package FINALPACKAGE=1
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Prepare Artifacts
        run: |
          mkdir -p output
          cp packages/*.deb output/
          cp VolumeBoostYT.plist output/
          
          # Move the compiled dylib into the output folder for easy sideload access
          if [ -f .theos/obj/VolumeBoostYT.dylib ]; then
            cp .theos/obj/VolumeBoostYT.dylib output/
          elif [ -f .theos/obj/debug/VolumeBoostYT.dylib ]; then
            cp .theos/obj/debug/VolumeBoostYT.dylib output/
          fi

      - name: Upload .deb Package
        uses: actions/upload-artifact@v4
        with:
          name: VolumeBoostYT (Jailbreak DEB)
          path: output/*.deb

      - name: Upload .dylib File
        uses: actions/upload-artifact@v4
        with:
          name: VolumeBoostYT (Sideload DYLIB)
          path: output/VolumeBoostYT.dylib

      - name: Upload .plist File
        uses: actions/upload-artifact@v4
        with:
          name: VolumeBoostYT (Sideload PLIST)
          path: output/VolumeBoostYT.plist
